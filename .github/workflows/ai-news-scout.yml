name: AI News Scout – Daily Delivery

on:
  schedule:
    - cron: '30 0 * * *'   # 06:00 AM IST (UTC+5:30) every day
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Create session and wait for completion
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AGENT_ID: ${{ secrets.AGENT_ID }}
          ENVIRONMENT_ID: ${{ secrets.ENVIRONMENT_ID }}
          VAULT_ID: ${{ secrets.VAULT_ID }}
        run: |
          pip install anthropic --quiet

          python3 << 'EOF'
          import anthropic
          import os

          client = anthropic.Anthropic()

          # Create session
          session = client.beta.sessions.create(
              agent={"type": "agent", "id": os.environ['AGENT_ID']},
              environment_id=os.environ['ENVIRONMENT_ID'],
              vault_ids=[os.environ['VAULT_ID']],
              title="AI News Scout – Daily Run",
              betas=["managed-agents-2026-04-01"],
          )
          print(f"Session created: {session.id}")

          # Send trigger message
          client.beta.sessions.events.send(
              session_id=session.id,
              events=[{
                  "type": "user.message",
                  "content": [{"type": "text", "text": "Run the daily AI news scan and post to Slack."}]
              }],
              betas=["managed-agents-2026-04-01"],
          )

          # Stream events until idle/terminated
          with client.beta.sessions.events.stream(
              session_id=session.id,
              betas=["managed-agents-2026-04-01"],
          ) as stream:
              for event in stream:
                  print(f"[{event.type}]")
                  if event.type in ("session.status_idle", "session.status_terminated"):
                      print("Agent completed. Slack message delivered.")
                      break

          EOF
